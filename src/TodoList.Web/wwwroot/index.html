<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList</title>
    <base href="/" />
    <!-- Bootstrap (obrigatório no projeto): CSS via CDN jsDelivr. Cuidado: depende de rede -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body>
    <!-- Ponto de montagem do componente raiz (App.razor, registrado em Program.cs). -->
    <div id="app">Carregando...</div>

    <!-- UI de erro do Blazor: oculta por padrão, exibida pelo framework em falhas. -->
    <div id="blazor-error-ui" style="display: none;">
        Ocorreu um erro não tratado.
        <a href="" class="reload">Recarregar</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <!-- Bundle do Bootstrap (inclui Popper), necessário para o accordion e demais componentes interativos. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
